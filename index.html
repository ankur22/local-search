<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Local RAG UI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      margin: 0;
      padding: 0;
      background: #0f172a;
      color: #e5e7eb;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }
    header {
      padding: 12px 16px;
      background: #020617;
      border-bottom: 1px solid #1e293b;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    header h1 {
      margin: 0;
      font-size: 16px;
      font-weight: 600;
    }
    header span {
      font-size: 12px;
      color: #9ca3af;
    }
    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .message {
      max-width: 800px;
      margin-bottom: 8px;
      padding: 12px 14px;
      border-radius: 10px;
      line-height: 1.5;
      font-size: 14px;
      white-space: pre-wrap;
    }
    .user {
      align-self: flex-end;
      background: #1d4ed8;
    }
    .assistant {
      align-self: flex-start;
      background: #020617;
      border: 1px solid #1f2937;
    }
    .sources {
      margin-top: 8px;
      font-size: 12px;
      color: #9ca3af;
    }
    .source-item {
      border-top: 1px solid #1f2937;
      margin-top: 4px;
      padding-top: 4px;
      cursor: pointer;
    }
    .source-item:hover {
      color: #e5e7eb;
    }
    .source-preview {
      margin-top: 2px;
      font-size: 11px;
      color: #6b7280;
    }
    #input-bar {
      padding: 10px 12px;
      border-top: 1px solid #1e293b;
      background: #020617;
      display: flex;
      gap: 8px;
      align-items: center;
    }
    #query {
      flex: 1;
      padding: 10px 12px;
      border-radius: 999px;
      border: 1px solid #1f2937;
      background: #020617;
      color: #e5e7eb;
      font-size: 14px;
      outline: none;
    }
    #query:focus {
      border-color: #3b82f6;
    }
    button {
      border-radius: 999px;
      border: none;
      padding: 0 16px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      background: #3b82f6;
      color: white;
      height: 36px;
    }
    button:disabled {
      opacity: 0.5;
      cursor: default;
    }
    #status {
      font-size: 11px;
      color: #9ca3af;
    }
    #header-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    #clear-btn {
      background: #374151;
    }
    #clear-btn:hover {
      background: #4b5563;
    }
  </style>
</head>
<body>
<header>
  <div>
    <h1>Local RAG Search</h1>
    <span>Ollama + Chroma + your files</span>
  </div>
  <div id="header-right">
    <div id="status"></div>
    <button id="clear-btn" type="button">Clear chat</button>
  </div>
</header>

<div id="chat"></div>

<div id="input-bar">
  <input id="query" placeholder="Ask something about your notes, code, PDFs..." />
  <button id="send-btn">Ask</button>
</div>

<script>
  const chat = document.getElementById('chat');
  const queryInput = document.getElementById('query');
  const sendBtn = document.getElementById('send-btn');
  const clearBtn = document.getElementById('clear-btn');
  const statusEl = document.getElementById('status');

  const HISTORY_KEY = 'local-rag-chat-history-v1';
  let history = [];

  function saveHistory() {
    try {
      localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
    } catch (e) {
      console.warn('Failed to save history:', e);
    }
  }

  function loadHistory() {
    try {
      const raw = localStorage.getItem(HISTORY_KEY);
      if (!raw) return;
      const parsed = JSON.parse(raw);
      if (!Array.isArray(parsed)) return;
      history = parsed;
      history.forEach(msg => {
        appendMessage(msg.text, msg.role, msg.sources || null, false);
      });
    } catch (e) {
      console.warn('Failed to load history:', e);
      history = [];
    }
  }

  function appendMessage(text, role, sources, save = true) {
    const msg = document.createElement('div');
    msg.className = `message ${role}`;
    msg.textContent = text;

    if (role === 'assistant' && Array.isArray(sources) && sources.length) {
      const sDiv = document.createElement('div');
      sDiv.className = 'sources';
      sDiv.textContent = 'Sources:';
      sources.forEach(src => {
        const item = document.createElement('div');
        item.className = 'source-item';
        item.innerHTML = `[${src.id}] ${src.source} · ${src.ext} · chunk ${src.chunk_index + 1}/${src.total_chunks} · d=${src.distance.toFixed(4)}`;
        const preview = document.createElement('div');
        preview.className = 'source-preview';
        preview.textContent = src.preview.replace(/\s+/g, ' ').slice(0, 200) + '…';
        item.appendChild(preview);

        // Click to open file in Cursor
        item.addEventListener('click', async () => {
          try {
            await fetch('/api/open-file', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ path: src.source }),
            });
          } catch (e) {
            console.error('Failed to open file:', e);
          }
        });

        sDiv.appendChild(item);
      });
      msg.appendChild(sDiv);
    }

    chat.appendChild(msg);
    chat.scrollTop = chat.scrollHeight;

    if (save) {
      history.push({ role, text, sources: sources || [] });
      saveHistory();
    }
  }

  async function sendQuery() {
    const q = queryInput.value.trim();
    if (!q) return;

    appendMessage(q, 'user', null, true);
    queryInput.value = '';
    queryInput.focus();
    sendBtn.disabled = true;
    statusEl.textContent = 'Thinking…';

    try {
      const res = await fetch('/api/query', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ query: q, k: 8 }),
      });

      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        const msg = err.error || `Error: ${res.status} ${res.statusText}`;
        appendMessage(msg, 'assistant', null, true);
        return;
      }

      const data = await res.json();
      appendMessage(data.answer || '(no answer)', 'assistant', data.sources || [], true);
    } catch (e) {
      appendMessage(`Request failed: ${e}`, 'assistant', null, true);
    } finally {
      sendBtn.disabled = false;
      statusEl.textContent = '';
    }
  }

  function clearChat() {
    history = [];
    saveHistory();
    chat.innerHTML = '';
  }

  sendBtn.addEventListener('click', sendQuery);
  queryInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendQuery();
    }
  });

  clearBtn.addEventListener('click', clearChat);

  // Load previous history on startup
  loadHistory();
  queryInput.focus();
</script>
</body>
</html>
